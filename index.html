<script>
function criarConta(){

var user = document.getElementById("novoUser").value;
var pass = document.getElementById("novaSenha").value;

localStorage.setItem("pass", pass);

alert("Conta criada!");

}
</script>

<script>
function setPacote(valor, preco){
document.getElementById("quantidade").value = valor;
document.getElementById("valor").value = "$" + preco;
}
var pedidos = 0;

function aumentarPedidos(){
pedidos++;
document.getElementById("contador").innerText = pedidos;
}

function copiarPix(){

var pix = document.getElementById("pixKey")

pix.select()
pix.setSelectionRange(0, 99999)

navigator.clipboard.writeText(pix.value)

alert("Chave PIX copiada!")

}

</script>


<h2>Comprar Seguidores</h2>


<script>
function enviarPedido(){

var link = document.getElementById("link").value.trim();
var quantidade = document.getElementById("quantidade").value.trim();

if(link == "" || quantidade == ""){
alert("Preencha o link e a quantidade");
return;
}

fetch("https://patinho21.replit.app/order", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
link: link,
quantity: quantidade
})
})
.then(res => res.json())
.then(data => {
alert("Pedido enviado com sucesso!");
})
.catch(err => {
alert("Erro ao enviar pedido");
});

}
</script>
