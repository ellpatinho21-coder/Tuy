<script>
function login(){

var user = document.getElementById("user").value;
var pass = document.getElementById("pass").value;

if(user=="fino" && pass=="3606"){
document.getElementById("login").style.display="none";

alert("Bem-vindo administrador");

document.getElementById("painel-admin").style.display="block";

}

}

else{

}
</script>

<script>
var pedidos = 0;

function aumentarPedidos(){
pedidos++;
document.getElementById("contador").innerText = pedidos;
}

function setPacote(qtd){
document.getElementById("quantidade").value = qtd;
}

function login(){

var user = document.getElementById("user").value
var pass = document.getElementById("pass").value

if(user=="admin" && pass=="1234"){

document.getElementById("login").style.display="none"
document.getElementById("painel").style.display="block"

}else{

alert("Usuário ou senha errado")

}

}
function comprar(){

var link = document.getElementById("link").value
var quantidade = document.getElementById("quantidade").value

document.getElementById("pixBox").style.display = "block"

window.open("https://wa.me/5543991933855?text=Olá%20quero%20comprar%20seguidores.%0ALink:"+link+"%0AQuantidade:"+quantidade)

}

function copiarPix(){

var pix = document.getElementById("pixKey")

pix.select()
pix.setSelectionRange(0, 99999)

navigator.clipboard.writeText(pix.value)

alert("Chave PIX copiada!")

}

function setPacote(qtd){
document.getElementById("quantidade").value = qtd;
}
